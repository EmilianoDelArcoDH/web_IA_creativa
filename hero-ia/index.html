<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clase 2 - Bloque web con IA</title>
  <style>
    :root { color-scheme: dark; --text: #fff7d6; --muted: #f4b9b0; --primary: #2a3fe5; --ok: #16a34a; --warn: #d97706; --bad: #dc2626; --shadow: 8px 8px 0 #f4b9b0 }
    * { box-sizing: border-box } body { margin: 0; min-height: 100vh; font-family: "Press Start 2P", "Space Mono", Consolas, monospace; color: var(--text); background: #000; background-image: radial-gradient(circle at 20% 20%, #f4b9b0 0 4px, transparent 5px), linear-gradient(90deg, rgba(42, 63, 229, .28) 1px, transparent 1px), linear-gradient(rgba(42, 63, 229, .28) 1px, transparent 1px); background-size: 140px 140px, 52px 52px, 52px 52px; padding: 28px }
    .shell { max-width: 1480px; margin: 0 auto } .eyebrow { color: var(--muted); text-transform: uppercase; font-size: .72rem; letter-spacing: .08em } h1 { margin: 10px 0 12px; font-size: clamp(1.7rem, 4vw, 3rem); line-height: 1.15; text-shadow: 4px 4px 0 var(--primary) } h2, h3 { line-height: 1.35 } p, label, textarea, input, select, button, small, span { font-family: "Space Mono", Consolas, monospace } p { color: var(--muted); line-height: 1.65 }
    .layout { display: grid; grid-template-columns: minmax(420px, 1fr) 420px; gap: 20px; align-items: start } .panel, .preview { border: 3px dotted var(--muted); border-radius: 8px; background: #000; box-shadow: var(--shadow); padding: 20px } .intro { display: grid; grid-template-columns: 320px 1fr; gap: 20px; margin-bottom: 20px }
    .card { border: 2px solid var(--primary); border-radius: 4px; background: #050505; padding: 14px; line-height: 1.55 } .step { border: 2px solid var(--primary); border-radius: 4px; background: #050505; padding: 16px; margin-bottom: 16px }
    label { display: grid; gap: 8px; font-weight: 900; line-height: 1.45 } textarea, input, select { width: 100%; border: 2px solid var(--primary); border-radius: 4px; background: #050505; color: var(--text); padding: 12px 13px; font-size: .95rem; outline: none } textarea { min-height: 84px; resize: vertical } textarea:focus, input:focus, select:focus { border-color: var(--muted); box-shadow: 0 0 0 4px rgba(244, 185, 176, .18) }
    .optionGrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px } .optionGrid.five { grid-template-columns: repeat(5, minmax(0, 1fr)) } .mini textarea { min-height: 70px } .benefit { display: grid; grid-template-columns: 1fr 130px; gap: 10px; align-items: start; margin-top: 10px }
    .preview { box-shadow: 8px 8px 0 var(--primary); position: sticky; top: 20px } .heroBox { border: 3px solid var(--text); border-radius: 4px; background: #050505; padding: 24px; min-height: 310px; display: grid; align-content: center; gap: 14px; background-image: linear-gradient(90deg, rgba(255, 255, 255, .1) 1px, transparent 1px), linear-gradient(rgba(255, 255, 255, .1) 1px, transparent 1px); background-size: 22px 22px } .heroBox h2 { font-size: clamp(1.5rem, 4vw, 3rem); margin: 0; text-shadow: 4px 4px 0 var(--primary) } .cta { display: inline-flex; width: fit-content; border: 2px solid #111827; border-radius: 4px; background: var(--muted); color: #111827; padding: 10px 12px; font-weight: 900 }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px } button { border: 3px solid #111827; border-radius: 4px; background: var(--muted); color: #111827; box-shadow: 5px 5px 0 var(--primary); padding: 12px 14px; font-weight: 900; text-transform: uppercase; cursor: pointer } button.secondary { background: #000; color: var(--text); border-color: var(--muted) } button:hover { transform: translate(-2px, -2px) }
    .feedback { display: grid; gap: 10px; margin-top: 14px } .item { display: flex; gap: 10px; border: 2px solid rgba(255, 255, 255, .14); border-radius: 4px; background: #050505; padding: 11px; line-height: 1.45 } .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--warn); margin-top: 5px; flex: 0 0 auto } .success { border-color: var(--ok) !important; background: rgba(22, 163, 74, .16) !important } .warning { border-color: var(--warn) !important; background: rgba(217, 119, 6, .16) !important } .error { border-color: var(--bad) !important; background: rgba(220, 38, 38, .16) !important } .completed .dot { background: var(--ok) } .status { margin-top: 14px; padding: 14px; border-radius: 4px; line-height: 1.55 }
    @media(max-width:1120px) { .layout, .intro { grid-template-columns: 1fr } .preview { position: static } .optionGrid.five { grid-template-columns: repeat(2, minmax(0, 1fr)) } }
    @media(max-width:700px) { body { padding: 18px } .optionGrid, .benefit, .optionGrid.five, .actions { grid-template-columns: 1fr } }
  </style>
  <link rel="stylesheet" href="../styles/activity.css">
</head>
<body>
  <main class="shell">
    <header>
      <div class="eyebrow" id="eyebrow"></div>
      <h1 id="pageTitle"></h1>
      <p id="pageIntro"></p>
    </header>
    <section class="intro">
      <aside class="panel">
        <h2 id="aiTitle"></h2>
        <div class="card"><strong id="cardOneLabel"></strong><br><span id="cardOneText"></span></div>
        <div class="card"><strong id="cardTwoLabel"></strong><br><span id="cardTwoText"></span></div>
      </aside>
      <section class="panel">
        <h2 id="projectTitle"></h2>
        <label><span id="projectLabel"></span><input name="project" id="projectInput" form="activityForm"></label>
        <p id="projectHelp"></p>
      </section>
    </section>
    <section class="layout">
      <form class="panel" id="activityForm">
        <article class="step">
          <h2 id="step1Title"></h2>
          <p id="step1Text"></p>
          <div class="optionGrid five mini" id="titleOptions"></div>
          <label><span id="titleFinalLabel"></span><input name="titleFinal"></label>
        </article>
        <article class="step">
          <h2 id="step2Title"></h2>
          <p id="step2Text"></p>
          <div class="optionGrid mini" id="subtitleOptions"></div>
          <label><span id="subtitleFinalLabel"></span><textarea name="subtitleFinal"></textarea></label>
        </article>
        <article class="step">
          <h2 id="step3Title"></h2>
          <p id="step3Text"></p>
          <div id="benefits"></div>
        </article>
        <article class="step">
          <h2 id="step4Title"></h2>
          <p id="step4Text"></p>
          <div class="optionGrid five mini" id="ctaOptions"></div>
          <label><span id="ctaFinalLabel"></span><input name="ctaFinal"></label>
          <label><span id="ctaActionLabel"></span><input name="ctaAction" id="ctaActionInput"></label>
        </article>
        <article class="step">
          <h2 id="step5Title"></h2>
          <label><span id="coherenceLabel"></span><textarea name="coherence" id="coherenceInput"></textarea></label>
        </article>
      </form>
      <aside class="preview">
        <h2 id="previewTitleLabel"></h2>
        <article class="heroBox">
          <h2 id="previewTitle"></h2>
          <p id="previewSubtitle"></p>
          <div id="previewBenefits"></div>
          <span class="cta" id="previewCta"></span>
        </article>
        <div class="actions"><button type="button" id="validateBtn"></button><button class="secondary" type="button" id="resetBtn"></button></div>
        <div class="feedback" id="feedback"></div>
        <div class="status warning" id="status"></div>
      </aside>
    </section>
  </main>
  <script type="module">
    import { PGEvent } from "../pg-event.js";

    const translations = {
      es: {
        metaTitle: "Clase 2 - Bloque web con IA", eyebrow: "Clase 2", pageTitle: "Construir un bloque web con IA", pageIntro: "Generá opciones, elegí una, editala y revisá si cada elemento habla del mismo proyecto y la misma audiencia.",
        aiTitle: "Uso de IA", cardOneLabel: "La IA propone:", cardOneText: "listas de títulos, subtítulos, beneficios y CTAs.", cardTwoLabel: "Vos decidís:", cardTwoText: "qué opción sirve, qué se edita y qué se descarta.",
        projectTitle: "Proyecto del bloque", projectLabel: "Nombre o tema", projectPlaceholder: "Ej: curso de fotografía con celular", projectHelp: "Guardá seguido con Ctrl+S / Cmd+S si estás editando archivos del Playground. Esta pantalla conserva tus respuestas en el navegador.",
        step1Title: "01 - Título", step1Text: "Pedile a la IA 5 opciones. Copialas, elegí una y editala si hace falta.", titleFinalLabel: "Título final con edición",
        step2Title: "02 - Subtítulo", step2Text: "Generá 3 opciones que acompañen al título final.", subtitleFinalLabel: "Subtítulo final con edición",
        step3Title: "03 - 3 beneficios con semáforo", step3Text: "Verde: lo dejo. Amarillo: lo edito. Rojo: lo descarto y genero otro.",
        step4Title: "04 - CTA principal", step4Text: "Generá 5 textos para el botón y explicá qué pasa al hacer clic.", ctaFinalLabel: "CTA final", ctaActionLabel: "Al hacer clic, la persona...", ctaActionPlaceholder: "Ej: va al formulario de inscripción",
        step5Title: "05 - Revisión final de coherencia", coherenceLabel: "¿Todo habla del mismo proyecto y público?", coherencePlaceholder: "Si algo no cierra, anotá qué ajustaste.",
        optionTitle: "Título", optionSubtitle: "Subtítulo", optionCta: "CTA", benefitLabel: "Beneficio", trafficLabel: "Semáforo", trafficOptions: ["Elegir", "Verde", "Amarillo", "Rojo"],
        previewTitleLabel: "Vista del bloque", previewTitlePending: "Título pendiente", previewSubtitlePending: "Subtítulo pendiente", previewCtaPending: "CTA pendiente", previewBenefitsPending: "Beneficios pendientes", noTraffic: "Sin semáforo",
        validateBtn: "Enviar actividad", resetBtn: "Reiniciar",
        feedbackLabels: { project: "Proyecto completo", titles: "5 opciones de título generadas", titleFinal: "Edición del título final", subtitles: "3 opciones de subtítulo generadas", subtitleFinal: "Edición del subtítulo final", benefits: "3 beneficios revisados con semáforo", ctas: "5 opciones de CTA generadas", ctaFinal: "CTA final completo", ctaAction: "Acción del clic explicada", coherence: "Revisión final escrita" },
        reasonLabels: { project: "Falta definir el proyecto del bloque.", titles: "Faltan las 5 opciones de título generadas con IA.", titleFinal: "Falta elegir y editar el título final.", subtitles: "Faltan las 3 opciones de subtítulo.", subtitleFinal: "Falta elegir y editar el subtítulo final.", benefits: "Faltan 3 beneficios revisados con semáforo.", ctas: "Faltan las 5 opciones de CTA.", ctaFinal: "Falta elegir el CTA final.", ctaAction: "Falta explicar qué ocurre al hacer clic.", coherence: "Falta la revisión final de coherencia." },
        statusReady: "Actividad lista: el bloque tiene opciones, edición y coherencia final.", statusReview: "Revisá los puntos marcados antes de cerrar la actividad.", statusPending: "Completá las opciones generadas y tus decisiones.",
        pgSuccess: "Actividad completa: el bloque web tiene opciones, edición y coherencia.", pgFailure: "La actividad todavía tiene puntos por completar."
      },
      en: {
        metaTitle: "Class 2 - Web block with AI", eyebrow: "Class 2", pageTitle: "Build a web block with AI", pageIntro: "Generate options, choose one, edit it, and review whether all elements speak about the same project and audience.",
        aiTitle: "AI use", cardOneLabel: "AI proposes:", cardOneText: "lists of titles, subtitles, benefits, and CTAs.", cardTwoLabel: "You decide:", cardTwoText: "which option works, what gets edited, and what gets discarded.",
        projectTitle: "Block project", projectLabel: "Name or topic", projectPlaceholder: "Ex: mobile photography course", projectHelp: "Save often with Ctrl+S / Cmd+S if you are editing Playground files. This screen keeps your answers in the browser.",
        step1Title: "01 - Title", step1Text: "Ask the AI for 5 options. Copy them, choose one, and edit it if needed.", titleFinalLabel: "Chosen and edited title",
        step2Title: "02 - Subtitle", step2Text: "Generate 3 options that match the final title.", subtitleFinalLabel: "Final subtitle with edits",
        step3Title: "03 - 3 benefits with traffic light", step3Text: "Green: keep it. Yellow: edit it. Red: discard it and generate another one.",
        step4Title: "04 - Main CTA", step4Text: "Generate 5 button texts and explain what happens on click.", ctaFinalLabel: "Chosen CTA", ctaActionLabel: "When clicking, the user...", ctaActionPlaceholder: "Ex: goes to the signup form",
        step5Title: "05 - Final coherence review", coherenceLabel: "Does everything speak about the same project and audience?", coherencePlaceholder: "If something does not fit, note what you adjusted.",
        optionTitle: "Title", optionSubtitle: "Subtitle", optionCta: "CTA", benefitLabel: "Benefit", trafficLabel: "Traffic light", trafficOptions: ["Choose", "Green", "Yellow", "Red"],
        previewTitleLabel: "Block preview", previewTitlePending: "Pending title", previewSubtitlePending: "Pending subtitle", previewCtaPending: "Pending CTA", previewBenefitsPending: "Pending benefits", noTraffic: "No traffic light",
        validateBtn: "Submit activity", resetBtn: "Reset",
        feedbackLabels: { project: "Project defined", titles: "5 generated titles", titleFinal: "Chosen/edited title", subtitles: "3 generated subtitles", subtitleFinal: "Chosen/edited subtitle", benefits: "3 reviewed benefits with traffic light", ctas: "5 generated CTAs", ctaFinal: "Chosen CTA", ctaAction: "Click action explained", coherence: "Final review written" },
        reasonLabels: { project: "You still need to define the block project.", titles: "The 5 AI-generated title options are still missing.", titleFinal: "You still need to choose and edit the final title.", subtitles: "The 3 subtitle options are still missing.", subtitleFinal: "You still need to choose and edit the final subtitle.", benefits: "You still need 3 reviewed benefits with traffic light status.", ctas: "The 5 CTA options are still missing.", ctaFinal: "You still need to choose the final CTA.", ctaAction: "You still need to explain what happens on click.", coherence: "The final coherence review is still missing." },
        statusReady: "Activity ready: the block has options, editing, and final coherence.", statusReview: "Review the marked points before closing the activity.", statusPending: "Complete the generated options and your decisions.",
        pgSuccess: "Activity complete: the web block has options, editing, and coherence.", pgFailure: "The activity still has incomplete points."
      },
      pt: {
        metaTitle: "Aula 2 - Bloco web com IA", eyebrow: "Aula 2", pageTitle: "Construir um bloco web com IA", pageIntro: "Gere opções, escolha uma, edite e revise se todos os elementos falam do mesmo projeto e do mesmo público.",
        aiTitle: "Uso de IA", cardOneLabel: "A IA propõe:", cardOneText: "listas de títulos, subtítulos, benefícios e CTAs.", cardTwoLabel: "Você decide:", cardTwoText: "qual opção funciona, o que é editado e o que é descartado.",
        projectTitle: "Projeto do bloco", projectLabel: "Nome ou tema", projectPlaceholder: "Ex: curso de fotografia com celular", projectHelp: "Salve com frequência usando Ctrl+S / Cmd+S se estiver editando arquivos do Playground. Esta tela mantém suas respostas no navegador.",
        step1Title: "01 - Título", step1Text: "Peça à IA 5 opções. Copie, escolha uma e edite se necessário.", titleFinalLabel: "Título escolhido e editado",
        step2Title: "02 - Subtítulo", step2Text: "Gere 3 opções que acompanhem o título escolhido.", subtitleFinalLabel: "Subtítulo escolhido e editado",
        step3Title: "03 - 3 benefícios com semáforo", step3Text: "Verde: mantenho. Amarelo: edito. Vermelho: descarto e gero outro.",
        step4Title: "04 - CTA principal", step4Text: "Gere 5 textos para o botão e explique o que acontece ao clicar.", ctaFinalLabel: "CTA escolhido", ctaActionLabel: "Ao clicar, o usuário...", ctaActionPlaceholder: "Ex: vai para o formulário de inscrição",
        step5Title: "05 - Revisão final de coerência", coherenceLabel: "Tudo fala do mesmo projeto e público?", coherencePlaceholder: "Se algo não fechar, anote o que você ajustou.",
        optionTitle: "Título", optionSubtitle: "Subtítulo", optionCta: "CTA", benefitLabel: "Benefício", trafficLabel: "Semáforo", trafficOptions: ["Escolher", "Verde", "Amarelo", "Vermelho"],
        previewTitleLabel: "Visualização do bloco", previewTitlePending: "Título pendente", previewSubtitlePending: "Subtítulo pendente", previewCtaPending: "CTA pendente", previewBenefitsPending: "Benefícios pendentes", noTraffic: "Sem semáforo",
        validateBtn: "Enviar atividade", resetBtn: "Reiniciar",
        feedbackLabels: { project: "Projeto definido", titles: "5 títulos gerados", titleFinal: "Título escolhido/editado", subtitles: "3 subtítulos gerados", subtitleFinal: "Subtítulo escolhido/editado", benefits: "3 benefícios revisados com semáforo", ctas: "5 CTAs gerados", ctaFinal: "CTA escolhido", ctaAction: "Ação do clique explicada", coherence: "Revisão final escrita" },
        reasonLabels: { project: "Falta definir o projeto do bloco.", titles: "Faltam as 5 opções de título geradas com IA.", titleFinal: "Falta escolher e editar o título final.", subtitles: "Faltam as 3 opções de subtítulo.", subtitleFinal: "Falta escolher e editar o subtítulo final.", benefits: "Faltam 3 benefícios revisados com semáforo.", ctas: "Faltam as 5 opções de CTA.", ctaFinal: "Falta escolher o CTA final.", ctaAction: "Falta explicar o que acontece ao clicar.", coherence: "Falta a revisão final de coerência." },
        statusReady: "Atividade pronta: o bloco tem opções, edição e coerência final.", statusReview: "Revise os pontos marcados antes de encerrar a atividade.", statusPending: "Complete as opções geradas e suas decisões.",
        pgSuccess: "Atividade completa: o bloco web tem opções, edição e coerência.", pgFailure: "A atividade ainda tem pontos a completar."
      }
    };

    const supportedLanguages = ["es", "en", "pt"];
    const semanticCoherence = /(audience|audiencia|publico|público|project|proyecto|projeto|coheren|coheren|same|mismo|mesmo|fit|encaja|fecha|adjust|ajust|edit|edita|editar)/i;
    const pgEvent = new PGEvent();
    pgEvent.getValues();
    const params = new URLSearchParams(window.location.search);

    function detectLanguage() {
      const paramLang = (params.get("lang") || "").toLowerCase();
      if (supportedLanguages.includes(paramLang)) return paramLang;
      const segments = window.location.pathname.toLowerCase().split("/").filter(Boolean);
      const segmentLang = segments.find((segment) => supportedLanguages.includes(segment));
      if (segmentLang) return segmentLang;
      const hashLang = window.location.hash.replace("#", "").toLowerCase();
      if (supportedLanguages.includes(hashLang)) return hashLang;
      return "es";
    }

    const currentLanguage = detectLanguage();
    const t = translations[currentLanguage];
    const storageKey = `webIaCreativa.clase2.v2.${currentLanguage}`;
    const form = document.querySelector("#activityForm");
    const fields = ["project","title1","title2","title3","title4","title5","titleFinal","subtitle1","subtitle2","subtitle3","subtitleFinal","benefit1","benefit1Light","benefit2","benefit2Light","benefit3","benefit3Light","cta1","cta2","cta3","cta4","cta5","ctaFinal","ctaAction","coherence"];

    function setText(id, value) { document.querySelector(`#${id}`).textContent = value; }
    function optionField(label, name, type = "textarea") { return `<label><span>${label}</span><${type} name="${name}"></${type}></label>`; }

    function applyTranslations() {
      document.documentElement.lang = currentLanguage;
      document.title = t.metaTitle;
      ["eyebrow","pageTitle","pageIntro","aiTitle","cardOneLabel","cardOneText","cardTwoLabel","cardTwoText","projectTitle","projectLabel","projectHelp","step1Title","step1Text","titleFinalLabel","step2Title","step2Text","subtitleFinalLabel","step3Title","step3Text","step4Title","step4Text","ctaFinalLabel","ctaActionLabel","step5Title","coherenceLabel","previewTitleLabel","validateBtn","resetBtn"].forEach((id)=>setText(id,t[id]));
      document.querySelector("#projectInput").placeholder = t.projectPlaceholder;
      document.querySelector("#ctaActionInput").placeholder = t.ctaActionPlaceholder;
      document.querySelector("#coherenceInput").placeholder = t.coherencePlaceholder;
      document.querySelector("#titleOptions").innerHTML = [1,2,3,4,5].map((n)=>optionField(`${t.optionTitle} ${n}`,`title${n}`)).join("");
      document.querySelector("#subtitleOptions").innerHTML = [1,2,3].map((n)=>optionField(`${t.optionSubtitle} ${n}`,`subtitle${n}`)).join("");
      document.querySelector("#ctaOptions").innerHTML = [1,2,3,4,5].map((n)=>optionField(`${t.optionCta} ${n}`,`cta${n}`)).join("");
      document.querySelector("#benefits").innerHTML = [1,2,3].map((n)=>`<div class="benefit"><label><span>${t.benefitLabel} ${n}</span><textarea name="benefit${n}"></textarea></label><label><span>${t.trafficLabel}</span><select name="benefit${n}Light">${t.trafficOptions.map((option,index)=>`<option value="${index===0?"":option}">${option}</option>`).join("")}</select></label></div>`).join("");
    }

    function values() { return Object.fromEntries(fields.map((name) => [name, form[name]?.value.trim() || ""])); }
    function count(prefix, total) { const v = values(); let c = 0; for (let i = 1; i <= total; i += 1) { if (v[`${prefix}${i}`]) c += 1; } return c; }
    function validate() { const v = values(); return { project: v.project.length >= 4, titles: count("title", 5) >= 5, titleFinal: v.titleFinal.length >= 8, subtitles: count("subtitle", 3) >= 3, subtitleFinal: v.subtitleFinal.length >= 20, benefits: [1,2,3].every((n)=>v[`benefit${n}`].length >= 8 && v[`benefit${n}Light`]), ctas: count("cta", 5) >= 5, ctaFinal: v.ctaFinal.length >= 4, ctaAction: v.ctaAction.length >= 15, coherence: v.coherence.length >= 80 && semanticCoherence.test(v.coherence.toLowerCase()) }; }
    function reasonsFrom(result) { return Object.entries(result).filter(([, ok]) => !ok).map(([key]) => t.reasonLabels[key]); }
    function sendToPlayground(result, submission) { const reasons = reasonsFrom(result); pgEvent.postToPg({ event: reasons.length === 0 ? "SUCCESS" : "FAILURE", reasons, message: reasons.length === 0 ? t.pgSuccess : t.pgFailure, feedbackLanguage: currentLanguage, submissionLanguage: currentLanguage, submission, state: JSON.stringify({ activity: "clase-2-bloque-web", language: currentLanguage, feedbackLanguage: currentLanguage, completed: reasons.length === 0, project: submission.project, fields: result, submission, evaluatorInstructions: { supportedInputLanguages: supportedLanguages, feedbackLanguage: currentLanguage, returnFeedbackInSelectedLanguage: true } }) }); }
    function save() { localStorage.setItem(storageKey, JSON.stringify(values())); render(false); }
    function load() { const saved = JSON.parse(localStorage.getItem(storageKey) || "{}"); fields.forEach((name) => { if (form[name] && saved[name]) form[name].value = saved[name]; }); }
    function render(analyzed) { const v = values(); document.querySelector("#previewTitle").textContent = v.titleFinal || t.previewTitlePending; document.querySelector("#previewSubtitle").textContent = v.subtitleFinal || t.previewSubtitlePending; document.querySelector("#previewCta").textContent = v.ctaFinal || t.previewCtaPending; document.querySelector("#previewBenefits").innerHTML = [1,2,3].filter((n)=>v[`benefit${n}`]).map((n)=>`<p><strong>${v[`benefit${n}Light`] || t.noTraffic}:</strong> ${v[`benefit${n}`]}</p>`).join("") || `<p>${t.previewBenefitsPending}</p>`; const result = validate(); document.querySelector("#feedback").innerHTML = Object.entries(t.feedbackLabels).map(([key, label]) => `<div class="item ${result[key] ? "success completed" : analyzed ? "error" : "warning"}"><span class="dot"></span><span>${label}</span></div>`).join(""); const complete = Object.values(result).every(Boolean); const status = document.querySelector("#status"); status.className = `status ${complete ? "success" : analyzed ? "error" : "warning"}`; status.textContent = complete ? t.statusReady : analyzed ? t.statusReview : t.statusPending; if (analyzed) sendToPlayground(result, { ...v, benefits: [1,2,3].map((n)=>({ text: v[`benefit${n}`], traffic: v[`benefit${n}Light`] })).filter((item)=>item.text), titles: [v.title1,v.title2,v.title3,v.title4,v.title5].filter(Boolean), subtitles: [v.subtitle1,v.subtitle2,v.subtitle3].filter(Boolean), ctas: [v.cta1,v.cta2,v.cta3,v.cta4,v.cta5].filter(Boolean) }); }

    applyTranslations();
    document.addEventListener("input", (event) => { if (event.target.form === form) save(); });
    document.addEventListener("change", (event) => { if (event.target.form === form) save(); });
    document.querySelector("#validateBtn").addEventListener("click", () => render(true));
    document.querySelector("#resetBtn").addEventListener("click", () => { fields.forEach((name) => { if (form[name]) form[name].value = ""; }); localStorage.removeItem(storageKey); render(false); });
    load();
    render(false);
  </script>
</body>
</html>
