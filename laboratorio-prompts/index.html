<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clase 1 - Tu primer prompt</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --panel: #050505;
      --text: #fff7d6;
      --muted: #f4b9b0;
      --primary: #2a3fe5;
      --ok: #16a34a;
      --warn: #d97706;
      --bad: #dc2626;
      --shadow: 8px 8px 0 #2a3fe5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Press Start 2P", "Space Mono", Consolas, monospace;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(42,63,229,.22) 1px, transparent 1px),
        linear-gradient(rgba(42,63,229,.22) 1px, transparent 1px),
        radial-gradient(circle at 80% 18%, #f4b9b0 0 4px, transparent 5px),
        #000;
      background-size: 48px 48px, 48px 48px, 150px 150px;
      padding: 28px;
    }
    .shell { max-width: 1440px; margin: 0 auto; }
    .eyebrow { color: var(--muted); text-transform: uppercase; font-size: .72rem; letter-spacing: .08em; }
    h1 {
      margin: 10px 0 12px;
      font-size: clamp(1.7rem, 4vw, 3.1rem);
      line-height: 1.12;
      text-shadow: 4px 4px 0 var(--primary);
    }
    h2, h3 { line-height: 1.35; }
    p, label, textarea, input, button, small, span { font-family: "Space Mono", Consolas, monospace; }
    p { color: var(--muted); line-height: 1.65; }
    .layout {
      display: grid;
      grid-template-columns: 320px minmax(420px, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }
    .panel {
      border: 3px dotted var(--muted);
      border-radius: 8px;
      background: var(--bg);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .card {
      border: 2px solid var(--primary);
      border-radius: 4px;
      background: var(--panel);
      padding: 14px;
      margin-top: 14px;
      line-height: 1.55;
    }
    form { display: grid; gap: 16px; }
    label { display: grid; gap: 8px; font-weight: 900; line-height: 1.45; }
    textarea, input {
      width: 100%;
      border: 2px solid var(--primary);
      border-radius: 4px;
      background: var(--panel);
      color: var(--text);
      padding: 12px 13px;
      font-size: .95rem;
      outline: none;
    }
    textarea { min-height: 105px; resize: vertical; }
    textarea:focus, input:focus {
      border-color: var(--muted);
      box-shadow: 0 0 0 4px rgba(244,185,176,.18);
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .results { display: grid; gap: 10px; }
    .resultLine { display: grid; grid-template-columns: 88px 1fr; gap: 10px; align-items: start; }
    .badge {
      display: inline-flex;
      width: fit-content;
      border: 2px solid #111827;
      border-radius: 4px;
      background: var(--muted);
      color: #111827;
      padding: 5px 8px;
      font-weight: 900;
    }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button {
      border: 3px solid #111827;
      border-radius: 4px;
      background: var(--muted);
      color: #111827;
      box-shadow: 5px 5px 0 var(--primary);
      padding: 12px 14px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
    }
    button.secondary { background: #000; color: var(--text); border-color: var(--muted); }
    button:hover { transform: translate(-2px, -2px); }
    .checklist { display: grid; gap: 10px; margin-top: 14px; }
    .check {
      display: flex;
      gap: 10px;
      border: 2px solid rgba(255,255,255,.14);
      border-radius: 4px;
      background: var(--panel);
      padding: 11px;
      line-height: 1.45;
      font-family: "Space Mono", Consolas, monospace;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--warn); margin-top: 5px; flex: 0 0 auto; }
    .success { border-color: var(--ok) !important; background: rgba(22,163,74,.16) !important; }
    .warning { border-color: var(--warn) !important; background: rgba(217,119,6,.16) !important; }
    .error { border-color: var(--bad) !important; background: rgba(220,38,38,.16) !important; }
    .completed .dot { background: var(--ok); }
    .status { margin-top: 14px; padding: 14px; border-radius: 4px; line-height: 1.55; font-family: "Space Mono", Consolas, monospace; }
    .promptPreview {
      white-space: pre-wrap;
      min-height: 220px;
      color: #d9f99d;
      line-height: 1.65;
      font-family: "Space Mono", Consolas, monospace;
    }
    @media (max-width: 1120px) {
      .layout { grid-template-columns: 1fr 1fr; }
      .layout aside:last-child { grid-column: 1 / -1; }
    }
    @media (max-width: 760px) {
      body { padding: 18px; }
      .layout, .grid2, .actions, .resultLine { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="../styles/activity.css">
</head>
<body>
  <main class="shell">
    <header>
      <div class="eyebrow" id="eyebrow"></div>
      <h1 id="pageTitle"></h1>
      <p id="pageIntro"></p>
    </header>

    <section class="layout">
      <aside class="panel">
        <h2 id="briefTitle"></h2>
        <p id="briefText"></p>
        <div class="card"><strong id="cardAiLabel"></strong><br><span id="cardAiText"></span></div>
        <div class="card"><strong id="cardWorkLabel"></strong><br><span id="cardWorkText"></span></div>
        <div class="card"><strong id="cardIndependentLabel"></strong><br><span id="cardIndependentText"></span></div>
      </aside>

      <section class="panel">
        <form id="activityForm">
          <div class="grid2">
            <label>
              <span id="topicLabel">Tema o idea simple</span>
              <input name="topic" id="topicInput">
            </label>
            <label>
              <span id="contextLabel">Contexto de uso</span>
              <input name="context" id="contextInput">
            </label>
          </div>
          <label>
            <span id="promptLabel">MI PRIMER PROMPT</span>
            <textarea name="prompt" id="promptInput"></textarea>
          </label>
          <label>
            <span id="resultsLabel">RESULTADOS DE LA IA</span>
            <small id="resultsHelp"></small>
          </label>
          <div class="results">
            <div class="resultLine"><span class="badge" id="resultBadge1"></span><textarea name="result1"></textarea></div>
            <div class="resultLine"><span class="badge" id="resultBadge2"></span><textarea name="result2"></textarea></div>
            <div class="resultLine"><span class="badge" id="resultBadge3"></span><textarea name="result3"></textarea></div>
            <div class="resultLine"><span class="badge" id="resultBadge4"></span><textarea name="result4"></textarea></div>
            <div class="resultLine"><span class="badge" id="resultBadge5"></span><textarea name="result5"></textarea></div>
          </div>
          <label>
            <span id="analysisLabel">MI ANÁLISIS</span>
            <textarea name="analysis" id="analysisInput"></textarea>
          </label>
          <div class="actions">
            <button type="button" id="validateBtn"></button>
            <button class="secondary" type="button" id="resetBtn"></button>
          </div>
        </form>
      </section>

      <aside class="panel">
        <h2 id="deliverableTitle"></h2>
        <div class="promptPreview" id="deliverable"></div>
        <div class="checklist" id="checklist"></div>
        <div class="status warning" id="status"></div>
      </aside>
    </section>
  </main>

      },

        metaTitle: "Class 1 - Your first prompt",

        eyebrow: "Class 1",
        pageIntro: "Learn to write a clear, specific prompt, test 3 to 5 results, and justify a final choice using your own criteria.",

        briefText: "Choose a simple topic: a poster, a fictional logo, an Instagram image, or a web piece. The goal is not to get it right on the first try, but to see how the result changes depending on how you talk to the AI.",

      },
      pt: {

        cardAiText: "gerar opções e comparar resultados.",
        cardWorkLabel: "Seu trabalho é:",
        cardWorkText: "especificar, revisar, escolher e explicar por que essa versão funciona melhor.",
        cardIndependentLabel: "Atividade independente:",
        cardIndependentText: "você pode completá-la como prática de aula. Ao enviá-la, o Playground recebe apenas se está completa ou o que está faltando.",

        topicPlaceholder: "Ex: cartaz para um show indie",

        promptPlaceholder: "Inclua o que você quer, para quem é, o estilo visual e o contexto em que será usado.",
        resultsLabel: "RESULTADOS DA IA",
        resultsHelp: "Registre de 3 a 5 resultados. Você pode colar links, nomes de arquivos ou descrever cada imagem/resposta.",

        analysisLabel: "MINHA ANÁLISE",
        analysisPlaceholder: "O que funcionou, o que mudaria, qual você escolheu como final e por quê.",
        validateBtn: "Enviar atividade",
        resetBtn: "Reiniciar",
        deliverableTitle: "Entrega de hoje",
        pending: "Pendente",
        optional: "Opcional",
        previewPrompt: "MEU PRIMEIRO PROMPT:",
        previewResults: "RESULTADOS DA IA:",
        previewAnalysis: "MINHA ANÁLISE:",
        checklistLabels: {
          topic: "Tema ou ideia definidos",
          context: "Contexto de uso claro",
          prompt: "Prompt completo, não apenas uma frase solta",
          promptParts: "Inclui público, estilo ou contexto",
          results: "Há de 3 a 5 resultados registrados",
          analysis: "A análise tem desenvolvimento suficiente",
          decision: "A escolha final está justificada"
        },
        reasonLabels: {
          topic: "Falta definir um tema ou ideia simples.",
          context: "Falta esclarecer o contexto de uso.",
          prompt: "O prompt precisa estar mais completo.",
          promptParts: "O prompt deve incluir público, estilo visual ou contexto.",
          results: "Falta registrar pelo menos 3 resultados gerados com IA.",
          analysis: "Falta desenvolver a análise.",
          decision: "Falta justificar qual resultado você escolheu e por quê."
        },
        statusReady: "Atividade pronta: o prompt tem opções, análise e justificativa.",
        statusReview: "Revise os pontos marcados antes de encerrar a atividade.",
        statusPending: "Complete a entrega e envie quando estiver pronta.",
        pgSuccess: "Atividade completa: o prompt inclui testes, análise e escolha final.",
        pgFailure: "A atividade ainda tem pontos a completar.",
        validation: {
          promptParts: /(para|publico|público|estilo|visual|contexto|uso)/i,
          decision: /(escolho|escolhi|final|porque|por que|funcionou|mudaria)/i
        }
      }
    };

    const pgEvent = new PGEvent();
    pgEvent.getValues();

    const supportedLanguages = ["es", "en", "pt"];
    const params = new URLSearchParams(window.location.search);
    const multilingualValidation = {
      promptParts: /(para|for|audience|target|dirigido|estilo|style|visual|contexto|context|uso|use|publico|público)/i,
      decision: /(elijo|elegi|elegí|escolho|escolhi|i choose|chosen|final|because|porque|por que|por qué|worked|funciono|funcionó|funcionou|mudaria|cambiaria|cambiaría|would change|best option)/i
    };

    function detectLanguage() {
      const paramLang = (params.get("lang") || "").toLowerCase();
      if (supportedLanguages.includes(paramLang)) return paramLang;

      const segments = window.location.pathname.toLowerCase().split("/").filter(Boolean);
      const segmentLang = segments.find((segment) => supportedLanguages.includes(segment));
      if (segmentLang) return segmentLang;

      const hashLang = window.location.hash.replace("#", "").toLowerCase();
      if (supportedLanguages.includes(hashLang)) return hashLang;

      return "es";
    }

    const currentLanguage = detectLanguage();
    const t = translations[currentLanguage];
    const storageKey = `webIaCreativa.clase1.v2.${currentLanguage}`;
    const form = document.querySelector("#activityForm");
    const fields = ["topic", "context", "prompt", "result1", "result2", "result3", "result4", "result5", "analysis"];

    function setText(id, value) {
      document.querySelector(`#${id}`).textContent = value;
    }

    function applyTranslations() {
      document.documentElement.lang = currentLanguage;
      document.title = t.metaTitle;

      setText("eyebrow", t.eyebrow);
      setText("pageTitle", t.pageTitle);
      setText("pageIntro", t.pageIntro);
      setText("briefTitle", t.briefTitle);
      setText("briefText", t.briefText);
      setText("cardAiLabel", t.cardAiLabel);
      setText("cardAiText", t.cardAiText);
      setText("cardWorkLabel", t.cardWorkLabel);
      setText("cardWorkText", t.cardWorkText);
      setText("cardIndependentLabel", t.cardIndependentLabel);
      setText("cardIndependentText", t.cardIndependentText);
      setText("topicLabel", t.topicLabel);
      setText("contextLabel", t.contextLabel);
      setText("promptLabel", t.promptLabel);
      setText("resultsLabel", t.resultsLabel);
      setText("resultsHelp", t.resultsHelp);
      setText("analysisLabel", t.analysisLabel);
      setText("validateBtn", t.validateBtn);
      setText("resetBtn", t.resetBtn);
      setText("deliverableTitle", t.deliverableTitle);

      document.querySelector("#topicInput").placeholder = t.topicPlaceholder;
      document.querySelector("#contextInput").placeholder = t.contextPlaceholder;
      document.querySelector("#promptInput").placeholder = t.promptPlaceholder;
      document.querySelector("#analysisInput").placeholder = t.analysisPlaceholder;

      for (let index = 1; index <= 5; index += 1) {
        setText(`resultBadge${index}`, `${t.resultBadge} ${index}`);
      }
    }

    function data() {
      return Object.fromEntries(fields.map((name) => [name, form[name].value.trim()]));
    }

    function resultCount(values) {
      return [values.result1, values.result2, values.result3, values.result4, values.result5].filter(Boolean).length;
    }

    function validate() {
      const values = data();
      const prompt = values.prompt.toLowerCase();
      const analysis = values.analysis.toLowerCase();
      return {
        topic: values.topic.length >= 4,
        context: values.context.length >= 6,
        prompt: values.prompt.length >= 120,
        promptParts: multilingualValidation.promptParts.test(prompt) || t.validation.promptParts.test(prompt),
        results: resultCount(values) >= 3,
        analysis: values.analysis.length >= 140,
        decision: multilingualValidation.decision.test(analysis) || t.validation.decision.test(analysis)
      };
    }

    function reasonsFrom(checks) {
      return Object.entries(checks)
        .filter(([, ok]) => !ok)
        .map(([key]) => t.reasonLabels[key]);
    }

    function sendToPlayground(checks, values) {
      const reasons = reasonsFrom(checks);
      const submission = {
        topic: values.topic,
        context: values.context,
        prompt: values.prompt,
        results: [values.result1, values.result2, values.result3, values.result4, values.result5].filter(Boolean),
        analysis: values.analysis
      };

      pgEvent.postToPg({
        event: reasons.length === 0 ? "SUCCESS" : "FAILURE",
        reasons,
        message: reasons.length === 0 ? t.pgSuccess : t.pgFailure,
        feedbackLanguage: currentLanguage,
        submissionLanguage: currentLanguage,
        submission,
        state: JSON.stringify({
          activity: "clase-1-tu-primer-prompt",
          language: currentLanguage,
          feedbackLanguage: currentLanguage,
          results: resultCount(values),
          completed: reasons.length === 0,
          fields: checks,
          submission,
          evaluatorInstructions: {
            supportedInputLanguages: supportedLanguages,
            feedbackLanguage: currentLanguage,
            returnFeedbackInSelectedLanguage: true
          }
        })
      });
    }

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(data()));
      render(false);
    }

    function load() {
      const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
      fields.forEach((name) => {
        if (saved[name]) form[name].value = saved[name];
      });
    }

    function render(analyzed) {
      const values = data();
      const checks = validate();

      document.querySelector("#deliverable").textContent =
`${t.previewPrompt}
${values.prompt || t.pending}

${t.previewResults}
1. ${values.result1 || t.pending}
2. ${values.result2 || t.pending}
3. ${values.result3 || t.pending}
4. ${values.result4 || t.optional}
5. ${values.result5 || t.optional}

${t.previewAnalysis}
${values.analysis || t.pending}`;

      document.querySelector("#checklist").innerHTML = Object.entries(t.checklistLabels).map(([key, label]) => `
        <div class="check ${checks[key] ? "success completed" : analyzed ? "error" : "warning"}">
          <span class="dot"></span><span>${label}</span>
        </div>
      `).join("");

      const complete = Object.values(checks).every(Boolean);
      const status = document.querySelector("#status");
      status.className = `status ${complete ? "success" : analyzed ? "error" : "warning"}`;
      status.textContent = complete
        ? t.statusReady
        : analyzed
          ? t.statusReview
          : t.statusPending;

      if (analyzed) {
        sendToPlayground(checks, values);
      }
    }

    applyTranslations();
    form.addEventListener("input", save);
    document.querySelector("#validateBtn").addEventListener("click", () => render(true));
    document.querySelector("#resetBtn").addEventListener("click", () => {
      fields.forEach((name) => { form[name].value = ""; });
      localStorage.removeItem(storageKey);
      render(false);
    });

    load();
    render(false);
  </script>
</body>
</html>
